<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ແອັບຄຳນວນ ແລະ ບັນທຶກປະຫວັດການນອນ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f4f6f9; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .header-bg { background: linear-gradient(135deg, #111827 0%, #1e1b4b 50%, #311042 100%); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; }
        .action-btn-group .btn { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; padding: 0; border-radius: 10px !important; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header-bg text-center mb-5">
        <h1 class="fw-bold mb-2">💤 ເຄື່ອງຄຳນວນ & ບັນທຶກປະຫວັດການນອນ</h1>
    </div>

    <div class="container mb-5">
        <div class="row g-4 justify-content-center">
            <div class="col-lg-5">
                <div class="card p-4 h-100">
                    <h4 class="text-primary fw-bold mb-3">🌙 ນອນກາງຄືນ (3-6 ຮອບວຽນ)</h4>
                    <input type="time" id="bedtime" class="form-control form-control-lg text-center fw-bold mb-4" value="23:00">
                    <button onclick="calculateNightSleep()" class="btn btn-primary btn-lg w-100 mb-4 fw-bold">🔮 ຄຳນວນເວລາຕື່ນນອນ</button>
                    
                    <div id="nightResults" class="d-none">
                        <div class="list-group gap-2">
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div><b>3 ຮອບວຽນ (4.5 ຊມ)</b><br><span id="wake3" class="fs-4 fw-bold">--:--</span></div>
                                <div class="action-btn-group d-flex gap-2">
                                    <button onclick="copyToClipboard('wake3')" class="btn btn-secondary">⏰</button>
                                    <button onclick="saveToHistory('ກາງຄືນ', 'bedtime', 'wake3', '4 ຊົ່ວໂມງ 30 ນາທີ', '3 ຮອບວຽນ')" class="btn btn-light border">💾</button>
                                </div>
                            </div>
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div><b>4 ຮອບວຽນ (6.0 ຊມ)</b><br><span id="wake4" class="fs-4 fw-bold">--:--</span></div>
                                <div class="action-btn-group d-flex gap-2">
                                    <button onclick="copyToClipboard('wake4')" class="btn btn-warning">⏰</button>
                                    <button onclick="saveToHistory('ກາງຄືນ', 'bedtime', 'wake4', '6 ຊົ່ວໂມງ', '4 ຮອບວຽນ')" class="btn btn-light border">💾</button>
                                </div>
                            </div>
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div><b>5 ຮອບວຽນ (7.5 ຊມ)</b><br><span id="wake5" class="fs-4 fw-bold">--:--</span></div>
                                <div class="action-btn-group d-flex gap-2">
                                    <button onclick="copyToClipboard('wake5')" class="btn btn-success">⏰</button>
                                    <button onclick="saveToHistory('ກາງຄືນ', 'bedtime', 'wake5', '7 ຊົ່ວໂມງ 30 ນາທີ', '5 ຮອບວຽນ')" class="btn btn-light border">💾</button>
                                </div>
                            </div>
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div><b>6 ຮອບວຽນ (9.0 ຊມ)</b><br><span id="wake6" class="fs-4 fw-bold">--:--</span></div>
                                <div class="action-btn-group d-flex gap-2">
                                    <button onclick="copyToClipboard('wake6')" class="btn btn-info">⏰</button>
                                    <button onclick="saveToHistory('ກາງຄືນ', 'bedtime', 'wake6', '9 ຊົ່ວໂມງ', '6 ຮອບວຽນ')" class="btn btn-light border">💾</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card p-4 h-100">
                    <h4 class="text-warning fw-bold mb-3">☀️ ງີບຫຼັບຕອນສວຍ (Power Nap)</h4>
                    <input type="time" id="naptime" class="form-control form-control-lg text-center fw-bold mb-4" value="13:00">
                    <button onclick="calculateNap()" class="btn btn-warning btn-lg w-100 mb-4 fw-bold text-white">⚡ ຄຳນວນເວລາຕັ້ງປຸກ</button>
                    
                    <div id="napResults" class="d-none">
                        <div class="list-group">
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <div><b>Power Nap (20 ນາທີ)</b><br><span id="napPower" class="fs-4 fw-bold">--:--</span></div>
                                <div class="action-btn-group d-flex gap-2">
                                    <button onclick="copyToClipboard('napPower')" class="btn btn-dark">⏰</button>
                                    <button onclick="saveToHistory('ງີບຕອນສວຍ', 'naptime', 'napPower', '20 ນາທີ', '0.22 ຮອບວຽນ')" class="btn btn-light border">💾</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-lg-10">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold text-dark mb-0">📊 ປະຫວັດການນອນ</h4>
                        <button onclick="clearHistory()" class="btn btn-outline-danger btn-sm">🗑️ ລຶບປະຫວັດ</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr><th>ວັນທີ</th><th>ປະເພດ</th><th>ເວລານອນ</th><th>ເວລາຕື່ນ</th><th>ໄລຍະເວລາ</th><th>ຮອບວຽນ</th></tr>
                            </thead>
                            <tbody id="historyTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', displayHistory);

        function addMinutes(timeStr, minutesToAdd) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(hours, minutes + minutesToAdd);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function calculateNightSleep() {
            const bedtime = document.getElementById('bedtime').value;
            if (!bedtime) return;
            document.getElementById('wake3').innerText = addMinutes(bedtime, 15 + (3 * 90));
            document.getElementById('wake4').innerText = addMinutes(bedtime, 15 + (4 * 90));
            document.getElementById('wake5').innerText = addMinutes(bedtime, 15 + (5 * 90));
            document.getElementById('wake6').innerText = addMinutes(bedtime, 15 + (6 * 90));
            document.getElementById('nightResults').classList.remove('d-none');
        }

        function calculateNap() {
            const naptime = document.getElementById('naptime').value;
            if (!naptime) return;
            document.getElementById('napPower').innerText = addMinutes(naptime, 15 + 20);
            document.getElementById('napResults').classList.remove('d-none');
        }

        function copyToClipboard(id) {
            const time = document.getElementById(id).innerText;
            navigator.clipboard.writeText(time);
        }

        function saveToHistory(type, inputId, resultId, duration, cycles) {
            const sleepTime = document.getElementById(inputId).value;
            const wakeTime = document.getElementById(resultId).innerText;
            if (wakeTime === "--:--") return;
            
            const record = { date: new Date().toLocaleDateString(), type: type, sleep: sleepTime, wake: wakeTime, duration: duration, cycles: cycles };
            let history = JSON.parse(localStorage.getItem('sleepHistory')) || [];
            history.unshift(record);
            localStorage.setItem('sleepHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('sleepHistory')) || [];
            document.getElementById('historyTableBody').innerHTML = history.map(item => `<tr><td>${item.date}</td><td>${item.type}</td><td>${item.sleep}</td><td><b>${item.wake}</b></td><td>${item.duration}</td><td>${item.cycles}</td></tr>`).join('');
        }

        function clearHistory() {
            localStorage.removeItem('sleepHistory');
            displayHistory();
        }
    </script>
</body>
</html>
